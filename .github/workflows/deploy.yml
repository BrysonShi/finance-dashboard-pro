# =============================================================
# GitHub Actions 自动部署配置
# 推送到 main 分支时自动部署到 GitHub Pages
# =============================================================

name: Deploy to GitHub Pages

# 触发条件：推送到 main 分支
on:
  push:
    branches: [main]
  # 允许手动触发
  workflow_dispatch:

# 设置页面部署权限
permissions:
  contents: read
  pages: write
  id-token: write

# 允许并发部署，但取消旧队列
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # =============================================================
  # 部署作业
  # =============================================================
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. 配置 GitHub Pages
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      # 3. 上传构建产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # public 目录包含所有静态文件
          path: 'public'

      # 4. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # 5. 输出部署信息
      - name: Deployment Summary
        run: |
          echo "✅ 部署成功！"
          echo "📂 部署目录: public/"
          echo "🔗 访问地址: ${{ steps.deployment.outputs.page_url }}"
